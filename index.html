<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="로또픽">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>로또픽</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --bg2:#12121a; --bg3:#1a1a26;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.15);
  --text:#f0f0f5; --text2:rgba(240,240,245,0.5); --text3:rgba(240,240,245,0.3);
  --accent:#c8a84b; --accent2:#e8c86b; --accent-bg:rgba(200,168,75,0.12);
  --red:#e05050; --green:#50c878; --blue:#5090e0;
  --ball1:#f5c842; --ball1t:#3d2f00;
  --ball2:#5b9cf6; --ball2t:#001a4d;
  --ball3:#ff6b6b; --ball3t:#4d0000;
  --ball4:#aaa;   --ball4t:#1a1a1a;
  --ball5:#66cc88; --ball5t:#003d14;
  --radius:16px; --radius-sm:10px;
  --tr:0.2s cubic-bezier(0.4,0,0.2,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow:hidden}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}

.header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--bg);position:relative;z-index:10;flex-shrink:0}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--accent)}
.logo span{color:var(--text)}
.round-badge{font-size:11px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);padding:4px 10px;border-radius:20px}

.nav{display:flex;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;border:none;background:none;cursor:pointer;color:var(--text3);font-size:10px;font-family:'Noto Sans KR',sans-serif;transition:color var(--tr);position:relative}
.nav-btn.active{color:var(--accent)}
.nav-btn.active::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--accent);border-radius:0 0 2px 2px}
.nav-icon{font-size:20px;line-height:1}

.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.scroll-area::-webkit-scrollbar{display:none}
.page{display:none;padding:16px}
.page.active{display:block}

.section-title{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}

/* BALLS */
.balls-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ball{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;position:relative;overflow:hidden;transition:transform .15s}
.ball::after{content:'';position:absolute;top:4px;left:8px;width:12px;height:6px;background:rgba(255,255,255,0.35);border-radius:50%;transform:rotate(-30deg)}
.ball-sm{width:34px;height:34px;font-size:11px}
.ball-sm::after{top:3px;left:6px;width:9px;height:4px}
.b1{background:var(--ball1);color:var(--ball1t)}
.b2{background:var(--ball2);color:var(--ball2t)}
.b3{background:var(--ball3);color:var(--ball3t)}
.b4{background:var(--ball4);color:var(--ball4t)}
.b5{background:var(--ball5);color:var(--ball5t)}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:500;transition:all var(--tr);border-radius:var(--radius-sm)}
.btn-gold{background:var(--accent);color:#0a0a0f;padding:15px 24px;font-size:15px;width:100%;border-radius:var(--radius);box-shadow:0 4px 20px rgba(200,168,75,0.3)}
.btn-gold:active{transform:scale(0.98);box-shadow:none}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border2);padding:10px 16px;font-size:13px}
.btn-outline:active{background:var(--bg3)}
.btn-ghost{background:var(--bg3);color:var(--text2);padding:8px 14px;font-size:12px}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(224,80,80,0.3);padding:8px 14px;font-size:12px}

/* MODE CHIPS */
.chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.chip{padding:8px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:all var(--tr);font-family:'Noto Sans KR',sans-serif}
.chip.active{background:var(--accent-bg);color:var(--accent);border-color:rgba(200,168,75,0.4)}

/* COUNT */
.count-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.count-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Noto Sans KR',sans-serif}
.count-display{font-size:22px;font-weight:700;color:var(--accent);min-width:50px;text-align:center}

/* MODE DESC */
.mode-desc{background:var(--accent-bg);border:1px solid rgba(200,168,75,0.2);border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:16px}
.mode-desc strong{color:var(--accent)}

/* TICKET */
.ticket{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;animation:slideIn .3s ease}
.ticket-label{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);min-width:22px}
.score-pill{font-size:10px;padding:3px 8px;border-radius:10px;background:rgba(200,168,75,0.15);color:var(--accent);font-weight:700;white-space:nowrap}
.ticket-actions{margin-left:auto;display:flex;gap:6px;flex-shrink:0}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}

/* DRAW CARD */
.draw-card{padding:16px}
.draw-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.draw-round{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent)}
.draw-date{font-size:11px;color:var(--text3)}
.bonus-sep{color:var(--text3);font-size:18px}

/* SAVED */
.saved-item,.history-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px}
.saved-meta,.history-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.saved-label{font-size:12px;color:var(--text2)}
.history-mode{font-size:10px;color:var(--accent);background:var(--accent-bg);padding:2px 8px;border-radius:10px}
.history-date{font-size:11px;color:var(--text3)}
.match-badge{font-size:11px;padding:2px 8px;border-radius:10px}
.match-0{background:var(--bg);color:var(--text3)}
.match-3{background:rgba(80,200,120,0.15);color:var(--green)}
.match-4{background:rgba(80,144,224,0.15);color:var(--blue)}
.match-5{background:rgba(200,168,75,0.2);color:var(--accent)}
.match-6{background:rgba(200,168,75,0.4);color:var(--accent2)}

/* STAT BARS (통계 탭) */
.stat-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.stat-ball-wrap{flex-shrink:0}
.stat-bar-track{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:3px;transition:width .8s ease}
.stat-count{font-size:11px;color:var(--text3);min-width:34px;text-align:right}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-size:13px;padding:10px 20px;border-radius:20px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* INSTALL BANNER */
.install-banner{background:var(--accent-bg);border:1px solid rgba(200,168,75,0.3);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.install-text{flex:1;font-size:12px;color:var(--text2);line-height:1.5}
.install-text strong{color:var(--accent);font-size:13px;display:block;margin-bottom:2px}

.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.divider{height:1px;background:var(--border);margin:16px 0}

@keyframes roll{0%{transform:scale(0) rotate(-360deg);opacity:0}60%{transform:scale(1.15) rotate(10deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}
.ball-appear{animation:roll .4s cubic-bezier(0.34,1.56,0.64,1) both}

/* 데이터 출처 배지 */
.data-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--green);background:rgba(80,200,120,0.1);border:1px solid rgba(80,200,120,0.2);padding:4px 10px;border-radius:20px;margin-bottom:12px}
</style>
</head>
<body>

<div class="header">
  <div class="logo">로또<span>픽</span></div>
  <div class="round-badge" id="current-round">데이터 로딩 중...</div>
</div>

<div class="scroll-area">

  <!-- 생성 페이지 -->
  <div class="page active" id="page-gen">

    <div id="install-banner" class="install-banner" style="display:none">
      <div style="font-size:24px">📲</div>
      <div class="install-text"><strong>홈 화면에 추가하기</strong>Safari → 공유 → "홈 화면에 추가"</div>
      <button class="btn btn-ghost" onclick="dismissInstall()" style="font-size:18px;padding:4px 8px">✕</button>
    </div>

    <div class="data-badge" id="data-badge">
      <span>●</span> <span id="data-info">1~1220회 실제 데이터 반영</span>
    </div>

    <p class="section-title">생성 방식</p>
    <div class="chip-row" id="mode-chips">
      <div class="chip active" data-mode="random" onclick="selectMode(this)">🎲 완전 랜덤</div>
      <div class="chip" data-mode="hot" onclick="selectMode(this)">🔥 자주 나온</div>
      <div class="chip" data-mode="cold" onclick="selectMode(this)">❄️ 안 나온</div>
      <div class="chip" data-mode="pair" onclick="selectMode(this)">🔗 동반 출현</div>
      <div class="chip" data-mode="smart" onclick="selectMode(this)">🧠 스마트</div>
    </div>

    <div class="mode-desc" id="mode-desc">1~45번에서 완전 무작위로 뽑습니다.</div>

    <p class="section-title">게임 수</p>
    <div class="count-row">
      <button class="count-btn" onclick="changeCount(-1)">−</button>
      <div class="count-display"><span id="game-count">5</span>게임</div>
      <button class="count-btn" onclick="changeCount(1)">+</button>
    </div>

    <button class="btn btn-gold" onclick="generateAll()"><span>✦</span> 번호 생성하기</button>

    <div style="height:16px"></div>
    <div id="tickets-container"></div>
    <div id="gen-actions" style="display:none;gap:8px;flex-wrap:wrap;margin-top:4px">
      <button class="btn btn-outline" onclick="saveAll()">💾 전체 저장</button>
      <button class="btn btn-outline" onclick="generateAll()">🔄 다시 생성</button>
      <button class="btn btn-ghost" onclick="copyAll()">📋 복사</button>
    </div>
    <div style="height:20px"></div>
  </div>

  <!-- 당첨 페이지 -->
  <div class="page" id="page-draw">
    <p class="section-title">최신 당첨 번호</p>
    <div class="card draw-card" id="latest-draw-card">
      <div style="text-align:center;padding:20px;color:var(--text3)">불러오는 중...</div>
    </div>
    <p class="section-title">내 저장 번호 대조</p>
    <div id="check-results-area">
      <div class="empty"><div class="empty-icon">🎯</div>저장된 번호가 없습니다</div>
    </div>
    <div style="height:20px"></div>
  </div>

  <!-- 저장 페이지 -->
  <div class="page" id="page-saved">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <p class="section-title" style="margin:0">저장된 번호</p>
      <button class="btn btn-danger btn-ghost" onclick="clearSaved()" style="font-size:11px;padding:6px 10px">전체 삭제</button>
    </div>
    <div id="saved-list"></div>
    <div style="height:20px"></div>
  </div>

  <!-- 히스토리 페이지 -->
  <div class="page" id="page-history">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <p class="section-title" style="margin:0">생성 히스토리</p>
      <button class="btn btn-danger btn-ghost" onclick="clearHistory()" style="font-size:11px;padding:6px 10px">전체 삭제</button>
    </div>
    <div id="history-list"></div>
    <div style="height:20px"></div>
  </div>

  <!-- 통계 페이지 -->
  <div class="page" id="page-stats">
    <div class="data-badge" style="margin-bottom:12px"><span>●</span> 1~1220회 전체 기반</div>
    <p class="section-title">출현 빈도 TOP 15</p>
    <div id="stats-hot"></div>
    <div class="divider"></div>
    <p class="section-title">출현 빈도 BOTTOM 10</p>
    <div id="stats-cold"></div>
    <div class="divider"></div>
    <p class="section-title">자주 함께 나온 쌍 TOP 15</p>
    <div id="stats-pairs"></div>
    <div style="height:20px"></div>
  </div>

</div>

<nav class="nav">
  <button class="nav-btn active" onclick="goPage('gen',this)">
    <span class="nav-icon">✦</span>생성
  </button>
  <button class="nav-btn" onclick="goPage('draw',this)">
    <span class="nav-icon">🏆</span>당첨
  </button>
  <button class="nav-btn" onclick="goPage('saved',this)">
    <span class="nav-icon">💾</span>저장
  </button>
  <button class="nav-btn" onclick="goPage('history',this)">
    <span class="nav-icon">📋</span>히스토리
  </button>
  <button class="nav-btn" onclick="goPage('stats',this)">
    <span class="nav-icon">📊</span>통계
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 실제 데이터 (1~1220회 기반)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// 번호별 실제 출현 빈도
const FREQ_DATA = {1:168,2:154,3:171,4:159,5:153,6:163,7:168,8:156,9:133,10:161,11:164,12:177,13:175,14:170,15:167,16:166,17:169,18:172,19:167,20:168,21:165,22:142,23:147,24:164,25:151,26:164,27:180,28:154,29:153,30:156,31:166,32:142,33:173,34:182,35:161,36:162,37:171,38:169,39:166,40:172,41:147,42:154,43:163,44:161,45:174};

// 자주 함께 나온 번호 쌍 TOP 50 (1220회 전체 기반, 기대값 18.5회)
const PAIR_DATA = [[11,21,34],[33,40,33],[6,38,31],[1,28,30],[10,31,30],[12,24,30],[3,24,29],[14,15,29],[19,21,29],[24,27,29],[37,40,29],[15,34,29],[3,13,29],[34,42,29],[3,20,29],[3,27,28],[13,33,28],[30,34,28],[19,45,27],[25,36,27],[27,35,27],[1,3,27],[12,15,27],[8,39,27],[12,34,27],[7,18,27],[31,34,27],[21,34,27],[18,31,27],[8,27,27],[5,11,26],[27,38,26],[26,27,26],[27,40,26],[20,35,26],[7,24,26],[4,20,26],[6,28,26],[10,16,26],[7,19,26],[11,44,26],[5,20,26],[12,42,26],[18,45,26],[4,33,26],[5,34,26],[34,44,26],[7,38,25],[12,33,25],[10,40,25]];

// 최근 20회차 (중복 방지 및 스마트 모드용)
const RECENT_DRAWS = [[2,22,25,28,34,43],[1,2,15,28,39,45],[3,28,31,32,42,45],[8,10,15,20,29,31],[3,10,14,15,23,24],[13,15,19,21,44,45],[10,15,19,27,30,33],[5,11,25,27,36,38],[5,8,25,31,41,44],[23,26,27,35,38,40],[1,7,9,17,27,38],[2,17,20,35,37,39],[6,27,30,36,38,42],[10,22,24,27,38,45],[1,3,17,26,27,42],[1,4,16,23,31,41],[8,16,28,30,31,44],[3,6,18,29,35,39],[5,12,21,33,37,40],[7,9,24,27,35,36]];

const TOTAL_ROUNDS = 1220;
const MAX_FREQ = 182; // 34번
const MIN_FREQ = 133; // 9번

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 번호 생성 로직
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// 빈도 순위 미리 계산
const SORTED_HOT = Object.entries(FREQ_DATA).sort((a,b)=>b[1]-a[1]).map(e=>+e[0]);
const SORTED_COLD = [...SORTED_HOT].reverse();

// 페어 인덱스 (빠른 조회용)
const PAIR_INDEX = {};
PAIR_DATA.forEach(([a,b,cnt]) => {
  if(!PAIR_INDEX[a]) PAIR_INDEX[a] = [];
  if(!PAIR_INDEX[b]) PAIR_INDEX[b] = [];
  PAIR_INDEX[a].push({partner:b, cnt});
  PAIR_INDEX[b].push({partner:a, cnt});
});

function ballClass(n) {
  if(n<=10) return 'b1';
  if(n<=20) return 'b2';
  if(n<=30) return 'b3';
  if(n<=40) return 'b4';
  return 'b5';
}

function pickRandom(pool, count) {
  const copy = [...pool];
  const result = [];
  while(result.length < count && copy.length > 0) {
    const idx = Math.floor(Math.random() * copy.length);
    result.push(copy.splice(idx,1)[0]);
  }
  return result;
}

function isValid(nums) {
  // 역대 당첨 조합과 동일 체크 (최근 20회)
  const key = JSON.stringify(nums);
  if(RECENT_DRAWS.some(d => JSON.stringify(d) === key)) return false;
  // 4연번 이상 금지
  let maxConsec = 1, cur = 1;
  for(let i=1;i<nums.length;i++) {
    if(nums[i]-nums[i-1]===1) { cur++; maxConsec = Math.max(maxConsec,cur); }
    else cur = 1;
  }
  if(maxConsec >= 4) return false;
  return true;
}

function calcScore(nums) {
  let score = 60;
  const sum = nums.reduce((a,b)=>a+b,0);
  const odd = nums.filter(n=>n%2===1).length;
  const low = nums.filter(n=>n<=22).length;
  // 합계 범위 보너스 (실제 평균 138.2, 표준편차 30.8)
  if(sum >= 100 && sum <= 176) score += 15;
  // 홀짝 보너스 (홀3짝3이 역대 33.5%)
  if(odd >= 2 && odd <= 4) score += 15;
  // 저고 분포 보너스
  if(low >= 2 && low <= 4) score += 10;
  return Math.min(score, 100);
}

function generateNums(mode) {
  for(let attempt=0; attempt<3000; attempt++) {
    let nums;

    if(mode === 'random') {
      nums = pickRandom(Array.from({length:45},(_,i)=>i+1), 6);

    } else if(mode === 'hot') {
      // 상위 20개 풀에서 뽑되, 가중치 적용
      const pool = SORTED_HOT.slice(0, 20);
      nums = pickRandom(pool, 6);

    } else if(mode === 'cold') {
      // 하위 20개 풀
      const pool = SORTED_COLD.slice(0, 20);
      nums = pickRandom(pool, 6);

    } else if(mode === 'pair') {
      // 동반 출현 쌍 기반: TOP 페어에서 핵심 번호 1~2개 고정 후 나머지 뽑기
      const topPairs = PAIR_DATA.slice(0, 15);
      const chosen = topPairs[Math.floor(Math.random()*topPairs.length)];
      const seed = [chosen[0], chosen[1]]; // 핵심 쌍
      const rest = Array.from({length:45},(_,i)=>i+1).filter(n=>!seed.includes(n));
      nums = [...seed, ...pickRandom(rest, 4)];

    } else if(mode === 'smart') {
      // 스마트 모드:
      // 1) 최근 1~2회차 번호 제외
      // 2) 3~10회차 번호 40% 확률 제외
      // 3) 빈도 가중치 적용 (많이 나온 번호 선호)
      // 4) 합계 100~176 유도
      const vRecent = RECENT_DRAWS.slice(0,2).flat();
      const midRecent = RECENT_DRAWS.slice(2,10).flat();
      let pool = Array.from({length:45},(_,i)=>i+1).filter(n => {
        if(vRecent.includes(n)) return false;
        if(midRecent.includes(n) && Math.random()<0.4) return false;
        return true;
      });
      if(pool.length < 10) pool = Array.from({length:45},(_,i)=>i+1).filter(n=>!vRecent.includes(n));
      // 빈도 가중치 샘플링
      const weights = pool.map(n => FREQ_DATA[n]);
      const totalW = weights.reduce((a,b)=>a+b,0);
      const picked = [];
      const poolCopy = [...pool];
      const wCopy = [...weights];
      while(picked.length < 6 && poolCopy.length > 0) {
        let r = Math.random() * wCopy.reduce((a,b)=>a+b,0);
        for(let i=0;i<wCopy.length;i++) {
          r -= wCopy[i];
          if(r <= 0) { picked.push(poolCopy.splice(i,1)[0]); wCopy.splice(i,1); break; }
        }
      }
      nums = picked;
    }

    if(!nums || nums.length < 6) continue;
    nums = [...new Set(nums)].sort((a,b)=>a-b);
    if(nums.length < 6) continue;
    if(isValid(nums)) return { nums, score: calcScore(nums) };
  }
  // 폴백
  const nums = pickRandom(Array.from({length:45},(_,i)=>i+1),6).sort((a,b)=>a-b);
  return { nums, score: calcScore(nums) };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 상태 & 스토리지
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let currentMode = 'random';
let gameCount = 5;
let generatedTickets = [];
let latestDraw = null;

function getSaved() { try{return JSON.parse(localStorage.getItem('lotto_saved')||'[]')}catch{return[]} }
function getHistory() { try{return JSON.parse(localStorage.getItem('lotto_history')||'[]')}catch{return[]} }
function setSaved(d) { localStorage.setItem('lotto_saved',JSON.stringify(d)) }
function setHistory(d) { localStorage.setItem('lotto_history',JSON.stringify(d)) }

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// UI
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const MODE_DESC = {
  random: '1~45번에서 완전 무작위로 뽑습니다.',
  hot: `<strong>역대 자주 나온 상위 20개</strong> 번호 풀에서 뽑습니다.<br>34번(182회), 27번(180회), 12번(177회) 등이 포함됩니다.`,
  cold: `<strong>역대 잘 안 나온 하위 20개</strong> 번호 풀에서 뽑습니다.<br>9번(133회), 22번(142회), 32번(142회) 등이 포함됩니다.`,
  pair: `<strong>실제로 함께 자주 나온 쌍</strong>을 기반으로 생성합니다.<br>11&amp;21(34회), 33&amp;40(33회) 등 TOP 페어를 활용합니다.`,
  smart: `<strong>복합 알고리즘</strong>: 최근 1~2회 출현 번호 제외 + 빈도 가중치 반영.<br>합계 100~176 범위, 홀짝 균형을 유도합니다.`
};

function selectMode(el) {
  document.querySelectorAll('#mode-chips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  currentMode = el.dataset.mode;
  document.getElementById('mode-desc').innerHTML = MODE_DESC[currentMode];
}

function changeCount(d) {
  gameCount = Math.max(1, Math.min(10, gameCount+d));
  document.getElementById('game-count').textContent = gameCount;
}

function generateAll() {
  generatedTickets = [];
  const labels = 'ABCDEFGHIJ';
  for(let i=0;i<gameCount;i++) {
    const res = generateNums(currentMode);
    generatedTickets.push({label:labels[i], nums:res.nums, score:res.score});
  }
  renderTickets();
  const h = getHistory();
  h.unshift({id:Date.now(), mode:currentMode, tickets:generatedTickets, date:new Date().toLocaleString('ko-KR')});
  if(h.length>100) h.pop();
  setHistory(h);
}

function ballHtml(n, sm=false, delay=0) {
  const sz = sm?'ball-sm':'';
  const anim = delay>=0?`style="animation-delay:${delay}ms"`:'';
  return `<div class="ball ${ballClass(n)} ${sz} ball-appear" ${anim}>${n}</div>`;
}

function renderTickets() {
  const container = document.getElementById('tickets-container');
  container.innerHTML = generatedTickets.map((t,ti) => `
    <div class="ticket">
      <span class="ticket-label">${t.label}</span>
      <div class="balls-row" style="flex:1">
        ${t.nums.map((n,ni)=>ballHtml(n,false,ti*80+ni*60)).join('')}
      </div>
      <span class="score-pill">${t.score}점</span>
      <div class="ticket-actions">
        <button class="btn btn-ghost" onclick="saveSingle(${ti})" style="font-size:16px;padding:6px 8px">💾</button>
      </div>
    </div>`).join('');
  document.getElementById('gen-actions').style.display='flex';
}

function saveSingle(idx) {
  const t = generatedTickets[idx];
  const s = getSaved();
  s.unshift({id:Date.now(), label:t.label, nums:t.nums, mode:currentMode, score:t.score, date:new Date().toLocaleString('ko-KR')});
  setSaved(s);
  showToast(`${t.label}게임 저장됨`);
}

function saveAll() {
  const s = getSaved();
  generatedTickets.forEach(t => {
    s.unshift({id:Date.now()+Math.random(), label:t.label, nums:t.nums, mode:currentMode, score:t.score, date:new Date().toLocaleString('ko-KR')});
  });
  setSaved(s);
  showToast(`${generatedTickets.length}게임 모두 저장됨`);
}

function copyAll() {
  const text = generatedTickets.map(t=>`${t.label}: ${t.nums.join(', ')}`).join('\n');
  navigator.clipboard.writeText(text).then(()=>showToast('클립보드에 복사됨'));
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 페이지 라우팅
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function goPage(name, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='saved') renderSaved();
  if(name==='history') renderHistory();
  if(name==='draw') renderDrawPage();
  if(name==='stats') renderStats();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 당첨 조회
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function fetchLatestDraw() {
  try {
    const res = await fetch('https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo=0');
    const data = await res.json();
    latestDraw = {
      round:data.drwNo, date:data.drwNoDate,
      nums:[data.drwtNo1,data.drwtNo2,data.drwtNo3,data.drwtNo4,data.drwtNo5,data.drwtNo6],
      bonus:data.bnusNo, prize:data.firstWinamnt, winners:data.firstPrzwnerCo
    };
  } catch {
    latestDraw = {round:1220, date:'2026-03-29', nums:[2,22,25,28,34,43], bonus:16, prize:2114514161, winners:14, demo:true};
  }
  document.getElementById('current-round').textContent = `제 ${latestDraw.round}회`;
  renderDrawCard();
  matchSaved();
}

function renderDrawCard() {
  if(!latestDraw) return;
  const prize = (latestDraw.prize/100000000).toFixed(1);
  document.getElementById('latest-draw-card').innerHTML = `
    <div class="draw-header">
      <div>
        <div class="draw-round">제 ${latestDraw.round}회</div>
        <div class="draw-date">${latestDraw.date}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:var(--text3)">1등 당첨금</div>
        <div style="font-size:18px;font-weight:700;color:var(--accent)">${prize}억원</div>
        <div style="font-size:11px;color:var(--text3)">${latestDraw.winners}명</div>
      </div>
    </div>
    <div class="balls-row" style="justify-content:center;gap:6px;flex-wrap:wrap">
      ${latestDraw.nums.map(n=>ballHtml(n)).join('')}
      <div class="bonus-sep">+</div>
      ${ballHtml(latestDraw.bonus)}
    </div>
    ${latestDraw.demo?'<div style="margin-top:10px;font-size:11px;color:var(--text3);text-align:center">※ 샘플 데이터</div>':''}`;
}

function renderDrawPage() { renderDrawCard(); matchSaved(); }

function matchSaved() {
  if(!latestDraw) return;
  const saved = getSaved();
  const area = document.getElementById('check-results-area');
  if(!saved.length) { area.innerHTML='<div class="empty"><div class="empty-icon">🎯</div>저장된 번호가 없습니다</div>'; return; }
  area.innerHTML = saved.map(s => {
    const matched = s.nums.filter(n=>latestDraw.nums.includes(n));
    const bonusMatch = s.nums.includes(latestDraw.bonus);
    let rank='낙첨';
    if(matched.length===6) rank='1등 🎉';
    else if(matched.length===5&&bonusMatch) rank='2등';
    else if(matched.length===5) rank='3등';
    else if(matched.length===4) rank='4등';
    else if(matched.length===3) rank='5등';
    const mc = matched.length>=6?'match-6':matched.length>=5?'match-5':matched.length>=4?'match-4':matched.length>=3?'match-3':'match-0';
    return `<div class="saved-item">
      <div class="saved-meta">
        <span class="saved-label">${s.label}게임 · ${s.date.split(' ')[0]}</span>
        <span class="match-badge ${mc}">${matched.length}개 · ${rank}</span>
      </div>
      <div class="balls-row">${s.nums.map(n=>{
        const hit=latestDraw.nums.includes(n);
        return `<div class="ball ball-sm ${ballClass(n)}" style="opacity:${hit?1:0.3}">${n}</div>`;
      }).join('')}</div>
    </div>`;
  }).join('');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 저장 & 히스토리
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const MODE_LABEL = {random:'🎲 랜덤',hot:'🔥 자주나온',cold:'❄️ 안나온',pair:'🔗 동반',smart:'🧠 스마트'};

function renderSaved() {
  const saved = getSaved();
  const list = document.getElementById('saved-list');
  if(!saved.length) { list.innerHTML='<div class="empty"><div class="empty-icon">💾</div>저장된 번호가 없습니다</div>'; return; }
  list.innerHTML = saved.map(s=>`
    <div class="saved-item">
      <div class="saved-meta">
        <span class="saved-label">${s.date}</span>
        <span class="history-mode">${MODE_LABEL[s.mode]||s.mode}</span>
      </div>
      <div class="balls-row" style="justify-content:space-between;align-items:center">
        <div class="balls-row">${s.nums.map(n=>ballHtml(n,true,-1)).join('')}</div>
        <button class="btn btn-danger btn-ghost" onclick="deleteSaved(${s.id})" style="font-size:16px;padding:4px 8px;flex-shrink:0">🗑</button>
      </div>
    </div>`).join('');
}

function deleteSaved(id) {
  setSaved(getSaved().filter(x=>x.id!==id));
  renderSaved(); showToast('삭제됨');
}
function clearSaved() { if(!confirm('전체 삭제할까요?')) return; setSaved([]); renderSaved(); }

function renderHistory() {
  const h = getHistory();
  const list = document.getElementById('history-list');
  if(!h.length) { list.innerHTML='<div class="empty"><div class="empty-icon">📋</div>생성 기록이 없습니다</div>'; return; }
  list.innerHTML = h.map((item,hi)=>`
    <div class="history-item">
      <div class="history-meta">
        <span class="history-date">${item.date}</span>
        <span class="history-mode">${MODE_LABEL[item.mode]||item.mode}</span>
      </div>
      ${item.tickets.map(t=>`
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--accent);min-width:18px">${t.label}</span>
          <div class="balls-row">${t.nums.map(n=>ballHtml(n,true,-1)).join('')}</div>
          <button class="btn btn-ghost" onclick='restoreTicket(${JSON.stringify(t.nums)},"${t.label}")' style="font-size:12px;padding:4px 8px;flex-shrink:0">저장</button>
        </div>`).join('')}
    </div>`).join('');
}

function restoreTicket(nums, label) {
  const s = getSaved();
  s.unshift({id:Date.now(), label, nums, mode:'history', date:new Date().toLocaleString('ko-KR')});
  setSaved(s); showToast('저장됨');
}
function clearHistory() { if(!confirm('히스토리를 모두 삭제할까요?')) return; setHistory([]); renderHistory(); }

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 통계 탭
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderStats() {
  const hotDiv = document.getElementById('stats-hot');
  const coldDiv = document.getElementById('stats-cold');
  const pairDiv = document.getElementById('stats-pairs');

  const sorted = Object.entries(FREQ_DATA).sort((a,b)=>b[1]-a[1]);

  hotDiv.innerHTML = sorted.slice(0,15).map(([n,c])=>`
    <div class="stat-bar-row">
      <div class="stat-ball-wrap"><div class="ball ball-sm ${ballClass(+n)}" style="animation:none">${n}</div></div>
      <div class="stat-bar-track">
        <div class="stat-bar-fill" style="width:${Math.round((c-MIN_FREQ)/(MAX_FREQ-MIN_FREQ)*100)}%;background:var(--accent)"></div>
      </div>
      <div class="stat-count">${c}회</div>
    </div>`).join('');

  coldDiv.innerHTML = sorted.slice(-10).reverse().map(([n,c])=>`
    <div class="stat-bar-row">
      <div class="stat-ball-wrap"><div class="ball ball-sm ${ballClass(+n)}" style="animation:none">${n}</div></div>
      <div class="stat-bar-track">
        <div class="stat-bar-fill" style="width:${Math.round(c/MAX_FREQ*100)}%;background:var(--bg3)"></div>
      </div>
      <div class="stat-count">${c}회</div>
    </div>`).join('');

  pairDiv.innerHTML = PAIR_DATA.slice(0,15).map(([a,b,cnt])=>`
    <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:.5px solid var(--border)">
      <div class="ball ball-sm ${ballClass(a)}" style="animation:none">${a}</div>
      <span style="font-size:11px;color:var(--text3)">+</span>
      <div class="ball ball-sm ${ballClass(b)}" style="animation:none">${b}</div>
      <div style="flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${Math.round(cnt/34*100)}%;background:var(--blue);border-radius:3px"></div>
      </div>
      <span style="font-size:11px;color:var(--text3);min-width:36px;text-align:right">${cnt}회</span>
    </div>`).join('');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 유틸
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2000);
}

function dismissInstall() {
  document.getElementById('install-banner').style.display='none';
  localStorage.setItem('install_dismissed','1');
}

function checkInstall() {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if(isIOS && !isStandalone && !localStorage.getItem('install_dismissed')) {
    document.getElementById('install-banner').style.display='flex';
  }
}

// PWA 서비스워커
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

// 초기화
checkInstall();
fetchLatestDraw();
generateAll();
</script>
